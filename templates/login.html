{% extends "base.html" %}

{% block title %}Login — IntraComms{% endblock %}

{% block content %}
<div class="auth-shell">
    <p class="eyebrow">Welcome back</p>
    <h1>Sign in</h1>
    <form method="post" class="auth-form">
        <div>
            <label class="form-label" for="username">Username</label>
            <input class="form-control" id="username" name="username"
                   autocomplete="username" placeholder="Your username" required>
        </div>
        <div>
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password"
                   type="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary" type="submit" style="margin-top:4px;">Sign in</button>
    </form>
    <p class="auth-note">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    var form = document.querySelector(".auth-form");
    if (!form || !window.crypto || !window.crypto.subtle) return;
    form.addEventListener("submit", function () {
        var pwd  = (document.getElementById("password") || {}).value || "";
        var user = (document.getElementById("username") || {}).value || "";
        if (!pwd) return;
        var enc = new TextEncoder();
        crypto.subtle.importKey("raw", enc.encode(pwd), "PBKDF2", false, ["deriveBits"])
            .then(function (km) {
                return crypto.subtle.deriveBits(
                    { name: "PBKDF2", salt: enc.encode("intracomms:v1:" + user),
                      iterations: 100000, hash: "SHA-256" },
                    km, 256
                );
            }).then(function (bits) {
                sessionStorage.setItem("_iek",
                    btoa(String.fromCharCode.apply(null, new Uint8Array(bits))));
            }).catch(function () {});
    });
})();
</script>
{% endblock %}
